name: Build Project Zion APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons:main
      
      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi
      
      - name: Create ZIP archives for each architecture
        run: |
          mkdir -p build/outputs/zipped
          cd build/app/outputs/flutter-apk
          for apk in app-*.apk; do
            arch=$(echo "$apk" | sed 's/app-//' | sed 's/-release.apk//')
            zip "../../outputs/zipped/project_zion_${arch}.zip" "$apk"
          done
          cd -
      
      - name: Upload ZIP - armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: project-zion-armeabi-v7a
          path: build/outputs/zipped/project_zion_armeabi-v7a.zip
      
      - name: Upload ZIP - arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: project-zion-arm64-v8a
          path: build/outputs/zipped/project_zion_arm64-v8a.zip
      
      - name: Upload ZIP - universal
        uses: actions/upload-artifact@v4
        with:
          name: project-zion-universal
          path: build/outputs/zipped/project_zion_universal.zip
