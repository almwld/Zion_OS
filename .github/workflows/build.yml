name: Build Zion OS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create local.properties with Flutter SDK path
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "✅ local.properties created with SDK: $FLUTTER_ROOT"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zion-os-apk
          path: build/app/outputs/flutter-apk/*.apk
