name: zion_os
description: Zion OS - نظام تشغيل متكامل مع Termux
version: 4.5.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Termux components - الكود المصدر الحقيقي
  terminal_emulator:
    path: lib/termux/terminal-emulator
  terminal_view:
    path: lib/termux/terminal-view
  termux_shared:
    path: lib/termux/termux-shared

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
